<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopCloud — Catalog</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- Navbar -->
<nav class="navbar">
  <a href="products.html" class="navbar-brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="accent"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    ShopCloud
  </a>
  <ul class="navbar-links">
    <li><a href="products.html" class="active" id="navProducts">Catalog</a></li>
    <li>
      <a href="cart.html" id="navCart" style="display: flex; align-items: center; gap: 4px;">
        Cart <span class="badge" id="cartCountBadge" style="background: var(--accent-main); color: var(--accent-text); border: none;">0</span>
      </a>
    </li>
    <li><a href="receipt.html" id="navReceipts">Orders</a></li>
  </ul>
  <div class="navbar-actions">
    <button id="themeToggle" onclick="toggleTheme()" class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 1rem; border-color: transparent;">
      🌗
    </button>
    <div style="width: 1px; height: 20px; background-color: var(--border-color);"></div>
    <div style="font-size: 0.875rem; color: var(--text-muted); cursor: pointer;" onclick="handleLogout()">
      <span id="userName">User</span> (Logout)
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Catalog</h1>
      <p class="text-muted text-sm mt-4">Browse and search available inventory.</p>
    </div>
    
    <div class="search-wrapper">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </span>
      <input type="text" class="form-input" id="searchInput" placeholder="Search products, descriptions, or categories..." oninput="handleSmartSearch(event)" />
    </div>
  </div>

  <div class="aws-info-bar">
    <span style="font-weight: 500;">Connection:</span>
    <span class="aws-tag">DynamoDB Table: ecommerce-products</span>
    <span class="aws-tag">API: Node.js/Express</span>
    <span id="productCountInfo" style="margin-left: auto;"></span>
  </div>

  <div style="display:flex; gap:0.5rem; margin-bottom: 1.5rem;" id="categoryFilters">
    <button class="btn btn-outline" style="background: var(--bg-surface-hover); border-color: var(--border-color-focus);" data-category="all" onclick="filterByCategory(this, 'all')">All Products</button>
  </div>

  <!-- Product Grid -->
  <div class="products-grid" id="productsGrid">
    <!-- Initial Skeleton Loaders -->
    <div class="card">
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-text" style="width: 40%;"></div>
      <div class="skeleton skeleton-text" style="width: 90%; margin-top: 1rem;"></div>
      <div class="skeleton skeleton-text" style="width: 80%;"></div>
      <div class="skeleton skeleton-title" style="margin-top: 1.5rem; width: 30%;"></div>
      <div class="skeleton skeleton-btn"></div>
    </div>
    <div class="card">
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-text" style="width: 40%;"></div>
      <div class="skeleton skeleton-text" style="width: 90%; margin-top: 1rem;"></div>
      <div class="skeleton skeleton-text" style="width: 80%;"></div>
      <div class="skeleton skeleton-title" style="margin-top: 1.5rem; width: 30%;"></div>
      <div class="skeleton skeleton-btn"></div>
    </div>
    <div class="card">
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-text" style="width: 40%;"></div>
      <div class="skeleton skeleton-text" style="width: 90%; margin-top: 1rem;"></div>
      <div class="skeleton skeleton-text" style="width: 80%;"></div>
      <div class="skeleton skeleton-title" style="margin-top: 1.5rem; width: 30%;"></div>
      <div class="skeleton skeleton-btn"></div>
    </div>
    <div class="card">
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-text" style="width: 40%;"></div>
      <div class="skeleton skeleton-text" style="width: 90%; margin-top: 1rem;"></div>
      <div class="skeleton skeleton-text" style="width: 80%;"></div>
      <div class="skeleton skeleton-title" style="margin-top: 1.5rem; width: 30%;"></div>
      <div class="skeleton skeleton-btn"></div>
    </div>
  </div>

  <!-- Empty state -->
  <div class="card" id="emptyState" style="display:none; text-align: center; padding: 4rem 2rem;">
    <div style="font-size: 2rem; color: var(--text-muted); margin-bottom: 1rem;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m2 2 20 20"/><path d="M10.4 10.4 2 14v6c0 1.1.9 2 2 2h16c.3 0 .6-.1.8-.2"/><path d="M22 14v-4c0-1.1-.9-2-2-2h-3"/><path d="M18 18h.01"/><path d="M8 8H4c-1.1 0-2 .9-2 2v4"/><path d="M14 14h.01"/></svg>
    </div>
    <h3 style="margin-bottom: 0.5rem;">No matches found</h3>
    <p class="text-muted text-sm">We couldn't find any products matching your search criteria.</p>
  </div>
</main>

<script src="js/products.js"></script>
<!-- Adding auth.js to support the theme toggle across pages if needed, but we'll put the theme logic in a global script or inline -->
<script>
  function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
  }
  
  // Set initial theme
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>
</body>
</html>
